<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente IA - MTG SYSTEM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 600px;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px 15px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h1 {
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 0.95em;
        }

        .user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-10px); }
        }

        .input-area {
            padding: 15px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            background: white;
            border-radius: 0 0 15px 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: scale(1);
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 12px;
            border-left: 4px solid #c33;
        }

        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        @media (max-width: 480px) {
            .chat-container {
                max-width: 100%;
                max-height: 100%;
                border-radius: 0;
            }

            .chat-header {
                border-radius: 0;
            }

            .input-area {
                border-radius: 0;
            }

            .message-content {
                max-width: 90%;
            }

            .chat-header h1 {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>
                <span class="status-indicator"></span>
                Assistente IA - MTG SYSTEM
            </h1>
        </div>
        <div class="messages" id="messages">
            <div class="message assistant">
                <div class="message-content">
                    👋 Olá! Sou o assistente IA do MTG SYSTEM. Como posso ajudar você com seu sistema ERP de Magic: The Gathering?
                </div>
            </div>
        </div>
        <div class="input-area">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Digite sua pergunta..." 
                autocomplete="off"
            >
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Histórico de mensagens para manter contexto
        let conversationHistory = [
            {
                role: 'assistant',
                content: '👋 Olá! Sou o assistente IA do MTG SYSTEM. Como posso ajudar você com seu sistema ERP de Magic: The Gathering?'
            }
        ];

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Adiciona mensagem do usuário
            addMessage(message, 'user');
            conversationHistory.push({ role: 'user', content: message });
            
            userInput.value = '';
            sendBtn.disabled = true;

            // Mostra indicador de digitação
            const typingId = addTypingIndicator();

            try {
                // Usando API de terceiros que não expõe chave
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'mixtral-8x7b-32768', // Modelo gratuito e poderoso
                        messages: [
                            {
                                role: 'system',
                                content: `Você é um assistente IA do MTG SYSTEM, um ERP especializado em Magic: The Gathering. 
                                Ajude os usuários com:
                                - Dúvidas sobre o sistema ERP
                                - Gerenciamento de cartas e coleções
                                - Organização de eventos e torneios
                                - Dicas sobre Magic: The Gathering
                                - Troubleshooting do sistema
                                
                                Seja amigável, conciso e sempre ofereça soluções práticas. Respostas em português.`
                            },
                            ...conversationHistory
                        ],
                        max_tokens: 500,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'Erro ao conectar com a IA');
                }

                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;

                // Remove indicador de digitação
                removeMessage(typingId);

                // Adiciona resposta da IA
                addMessage(assistantMessage, 'assistant');
                conversationHistory.push({ role: 'assistant', content: assistantMessage });

            } catch (error) {
                console.error('Erro:', error);
                removeMessage(typingId);
                addMessage('❌ Erro ao conectar com a IA. Tente novamente em alguns instantes.', 'error');
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.id = 'msg-' + Date.now();
            
            const content = document.createElement('div');
            content.className = 'message-content';
            
            if (sender === 'error') {
                content.className += ' error';
            }
            
            content.textContent = text;
            msgDiv.appendChild(content);
            messagesDiv.appendChild(msgDiv);
            
            // Scroll automático
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            return msgDiv.id;
        }

        function addTypingIndicator() {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message assistant';
            msgDiv.id = 'typing-' + Date.now();
            
            const content = document.createElement('div');
            content.className = 'typing-indicator';
            
            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'typing-dot';
                content.appendChild(dot);
            }
            
            msgDiv.appendChild(content);
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            return msgDiv.id;
        }

        function removeMessage(id) {
            const msg = document.getElementById(id);
            if (msg) msg.remove();
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Foco inicial
        userInput.focus();

        console.log('%c✅ Assistente IA - MTG SYSTEM', 'color: #667eea; font-size: 16px; font-weight: bold;');
        console.log('%cUsando API Groq (100% gratuita e sem chave necessária)', 'color: #4ade80; font-size: 12px;');
    </script>
</body>
</html>
