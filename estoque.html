<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTG SYSTEM — Movimentação de Estoque</title>
  <link rel="stylesheet" href="app-bundle.css">
  <script src="app-bundle.js"></script>
  
  
  <style>
    .mov-tipo-entrada { color: var(--success); }
    .mov-tipo-saida   { color: var(--danger); }
    .mov-badge-entrada { background: var(--success-subtle); color: var(--success); }
    .mov-badge-saida   { background: var(--danger-subtle);  color: var(--danger);  }
    .qty-arrow { font-size: 11px; color: var(--text-faint); }
    .quick-btn {
      display: flex; align-items: center; gap: var(--s2);
      padding: 6px 12px; border-radius: var(--r-md); font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid; transition: all var(--t-fast);
    }
    .quick-btn-entrada { background: var(--success-subtle); color: var(--success); border-color: rgba(16,185,129,.25); }
    .quick-btn-entrada:hover { background: var(--success); color: white; }
    .quick-btn-saida { background: var(--danger-subtle); color: var(--danger); border-color: rgba(239,68,68,.25); }
    .quick-btn-saida:hover { background: var(--danger); color: white; }
    .stat-mini { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: var(--s4) var(--s5); display: flex; align-items: center; gap: var(--s4); }
    .stat-mini-icon { width: 40px; height: 40px; border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .stat-mini-icon svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; }
    .stat-mini-val { font-family: var(--font-h); font-size: 26px; font-weight: 800; color: var(--text-primary); line-height: 1; }
    .stat-mini-lbl { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .filter-row { display: flex; gap: var(--s2); flex-wrap: wrap; align-items: center; }
    .timeline-line { position: relative; padding-left: 28px; }
    .timeline-line::before { content:''; position:absolute; left:9px; top:0; bottom:0; width:2px; background:var(--border); border-radius:2px; }
    .tl-dot { position:absolute; left:0; top:14px; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; }
    .tl-dot-e { background:var(--success-subtle); color:var(--success); border:1.5px solid var(--success); }
    .tl-dot-s { background:var(--danger-subtle);  color:var(--danger);  border:1.5px solid var(--danger); }
    .tl-item { position:relative; padding:var(--s3) 0 var(--s3) var(--s4); border-bottom:1px solid var(--border); }
    .tl-item:last-child { border:none; }
  </style>
</head>
<body>
<div class="app-shell" id="app"></div>
<div id="toastContainer" class="toast-container"></div>

<!-- Modal Movimentação -->
<div id="movModal" class="modal-overlay">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title" id="movModalTitle">Registrar Movimentação</div>
      <button class="modal-close" onclick="Modal.close('movModal')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="movProdutoId">
      <input type="hidden" id="movTipo">

      <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-md);padding:var(--s4);margin-bottom:var(--s5)">
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:2px">Produto selecionado</div>
        <div id="movProdutoNome" style="font-weight:700;color:var(--text-primary);font-size:15px"></div>
        <div id="movEstoqueAtual" style="font-size:12px;color:var(--text-muted);margin-top:4px"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Tipo de Movimentação</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--s3)">
          <label style="cursor:pointer">
            <input type="radio" name="movTipoRadio" value="entrada" id="radioEntrada" style="display:none" onchange="setTipo('entrada')">
            <div id="btnEntrada" style="padding:var(--s3);border:2px solid var(--border);border-radius:var(--r-md);text-align:center;font-weight:600;font-size:13px;color:var(--text-muted);transition:all .15s">
              ↑ Entrada
            </div>
          </label>
          <label style="cursor:pointer">
            <input type="radio" name="movTipoRadio" value="saida" id="radioSaida" style="display:none" onchange="setTipo('saida')">
            <div id="btnSaida" style="padding:var(--s3);border:2px solid var(--border);border-radius:var(--r-md);text-align:center;font-weight:600;font-size:13px;color:var(--text-muted);transition:all .15s">
              ↓ Saída
            </div>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Quantidade *</label>
        <input type="number" id="movQtd" class="form-input" placeholder="0" min="1">
        <div class="form-error" data-error="movQtd"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Motivo / Observação</label>
        <input type="text" id="movMotivo" class="form-input" placeholder="Ex: Compra, Venda, Ajuste...">
      </div>

      <div id="movPreview" style="display:none;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-md);padding:var(--s4)">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">NOVO ESTOQUE APÓS MOVIMENTAÇÃO</div>
        <div id="movPreviewVal" style="font-family:var(--font-h);font-size:28px;font-weight:800;color:var(--text-primary)"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('movModal')">Cancelar</button>
      <button class="btn btn-primary" id="movConfirmBtn" onclick="confirmarMovimento()">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Confirmar
      </button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div id="confirmModal" class="modal-overlay">
  <div class="modal modal-sm"><div class="modal-body"><div class="confirm-dialog">
    <div class="confirm-icon danger"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
    <div class="confirm-title">Confirmar ação</div><div class="confirm-message"></div>
  </div></div><div class="modal-footer">
    <button class="btn btn-secondary" onclick="Modal.close('confirmModal')">Cancelar</button>
    <button class="btn btn-danger" id="confirmBtn">Confirmar</button>
  </div></div>
</div>

<script>
const session = Auth.requireAuth();
if (session) {
  Products.load();

  document.getElementById('app').innerHTML = renderLayout('Movimentação de Estoque', 'estoque.html') + `
  <main class="page-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Movimentação de Estoque</h1>
        <p>Registre entradas e saídas de produtos</p>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-secondary btn-sm" onclick="exportarMovimentos()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar CSV
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--s4);margin-bottom:var(--s6)" id="statsRow"></div>

    <!-- Tabs -->
    <div class="tabs" id="estoqueTabsEl">
      <div class="tab active" onclick="setTabEstoque('movimentos',this)">Movimentações</div>
      <div class="tab" onclick="setTabEstoque('produtos',this)">Produtos / Ação Rápida</div>
    </div>

    <div id="estoqueContent"></div>
  </main>
</div>`;

  App.init();
  renderStats();
  renderMovimentos();

  // Listener preview
  document.getElementById('movQtd').addEventListener('input', updatePreview);
}

function renderStats() {
  const movs = Estoque.getMovimentos();
  const entradas = Estoque.getTotalEntradas();
  const saidas = Estoque.getTotalSaidas();
  const criticos = Products.getCritical().length;
  const hoje = movs.filter(m => new Date(m.data).toDateString() === new Date().toDateString()).length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-mini">
      <div class="stat-mini-icon" style="background:var(--info-subtle);color:var(--info)">
        <svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>
      </div>
      <div><div class="stat-mini-val">${movs.length}</div><div class="stat-mini-lbl">Total Movimentações</div></div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-icon" style="background:var(--success-subtle);color:var(--success)">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
      </div>
      <div><div class="stat-mini-val" style="color:var(--success)">${entradas}</div><div class="stat-mini-lbl">Unidades Entrada</div></div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-icon" style="background:var(--danger-subtle);color:var(--danger)">
        <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </div>
      <div><div class="stat-mini-val" style="color:var(--danger)">${saidas}</div><div class="stat-mini-lbl">Unidades Saída</div></div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-icon" style="background:var(--warning-subtle);color:var(--warning)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div><div class="stat-mini-val" style="color:var(--warning)">${criticos}</div><div class="stat-mini-lbl">Críticos</div></div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-icon" style="background:var(--brand-subtle);color:var(--brand-400)">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div><div class="stat-mini-val">${hoje}</div><div class="stat-mini-lbl">Movimentações Hoje</div></div>
    </div>`;
}

let currentTabEstoque = 'movimentos';
function setTabEstoque(tab, el) {
  currentTabEstoque = tab;
  document.querySelectorAll('#estoqueTabsEl .tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  tab === 'movimentos' ? renderMovimentos() : renderProdutosAcao();
}
window.setTabEstoque = setTabEstoque;

function renderMovimentos() {
  const movs = Estoque.getMovimentos();
  const filtro = document.getElementById('filtroTipo')?.value || '';
  const busca = document.getElementById('buscaMov')?.value?.toLowerCase() || '';
  let lista = movs;
  if (filtro) lista = lista.filter(m => m.tipo === filtro);
  if (busca) lista = lista.filter(m => m.produtoNome.toLowerCase().includes(busca) || m.sku.toLowerCase().includes(busca));

  document.getElementById('estoqueContent').innerHTML = `
    <div class="table-container">
      <div class="table-toolbar">
        <div class="table-search-wrap">
          <div class="input-icon"><svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" fill="none" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
          <input type="text" id="buscaMov" class="form-input" placeholder="Buscar produto ou SKU..." style="padding-left:36px" oninput="renderMovimentos()">
        </div>
        <div class="filter-row">
          <select class="form-input form-select" id="filtroTipo" style="max-width:160px" onchange="renderMovimentos()">
            <option value="">Todos os tipos</option>
            <option value="entrada">Entradas</option>
            <option value="saida">Saídas</option>
          </select>
        </div>
      </div>
      <table>
        <thead><tr>
          <th>Tipo</th><th>Produto</th><th>SKU</th>
          <th>Qtd</th><th>Antes → Depois</th>
          <th>Motivo</th><th>Usuário</th><th>Data / Hora</th>
        </tr></thead>
        <tbody>
          ${lista.length === 0
            ? `<tr><td colspan="8"><div class="table-empty">
                <svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>
                <p>Nenhuma movimentação registrada</p></div></td></tr>`
            : lista.map(m => `<tr>
              <td>
                <span class="badge badge-dot ${m.tipo==='entrada'?'badge-success':'badge-danger'}">
                  ${m.tipo === 'entrada' ? 'Entrada' : 'Saída'}
                </span>
              </td>
              <td style="font-weight:600;color:var(--text-primary);max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.produtoNome}</td>
              <td style="font-family:monospace;font-size:12px;color:var(--text-muted)">${m.sku}</td>
              <td style="font-family:var(--font-h);font-size:16px;font-weight:800;color:${m.tipo==='entrada'?'var(--success)':'var(--danger)'}">${m.tipo==='entrada'?'+':'-'}${m.quantidade}</td>
              <td style="font-size:12px">
                <span style="color:var(--text-muted)">${m.qtdAntes}</span>
                <span style="color:var(--text-faint);margin:0 4px">→</span>
                <span style="font-weight:700;color:var(--text-primary)">${m.qtdDepois}</span>
              </td>
              <td style="color:var(--text-muted);font-size:13px">${m.motivo}</td>
              <td style="font-size:12.5px">${m.usuario}</td>
              <td>
                <div style="font-size:12.5px;color:var(--text-secondary);white-space:nowrap">${new Date(m.data).toLocaleDateString('pt-BR')}</div>
                <div style="font-size:11px;color:var(--text-muted)">${new Date(m.data).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
      <div class="pagination">
        <div class="pagination-info">${lista.length} movimentação(ões)</div>
      </div>
    </div>`;
}

function renderProdutosAcao() {
  Products.load();
  const produtos = Helpers.sortArray(Products.all, 'name', 'asc');
  document.getElementById('estoqueContent').innerHTML = `
    <div class="table-container">
      <div class="table-toolbar">
        <div class="table-search-wrap">
          <div class="input-icon"><svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" fill="none" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
          <input type="text" id="buscaProd" class="form-input" placeholder="Buscar produto..." style="padding-left:36px" oninput="renderProdutosAcao()">
        </div>
      </div>
      <table>
        <thead><tr>
          <th>Produto</th><th>SKU</th><th>Categoria</th>
          <th>Estoque Atual</th><th>Status</th><th>Movimentar</th>
        </tr></thead>
        <tbody>
          ${produtos.filter(p => {
              const b = document.getElementById('buscaProd')?.value?.toLowerCase() || '';
              return !b || p.name.toLowerCase().includes(b) || p.sku.toLowerCase().includes(b);
            }).map(p => {
              const s = Helpers.getStockStatus(p.quantity);
              const pct = Math.min(100, (p.quantity/50)*100);
              return `<tr>
                <td style="font-weight:600;color:var(--text-primary)">${p.name}</td>
                <td style="font-family:monospace;font-size:12px;color:var(--text-muted)">${p.sku}</td>
                <td><span class="badge badge-neutral">${p.category}</span></td>
                <td>
                  <div style="display:flex;align-items:center;gap:8px">
                    <div class="stock-bar-track stock-${s}" style="width:60px;flex:none"><div class="stock-bar-fill" style="width:${pct}%"></div></div>
                    <span style="font-family:var(--font-h);font-size:16px;font-weight:800;color:${s==='ok'?'var(--success)':s==='low'?'var(--warning)':'var(--danger)'}">${p.quantity}</span>
                  </div>
                </td>
                <td>${Helpers.stockBadge(p.quantity)}</td>
                <td>
                  <div style="display:flex;gap:6px">
                    <button class="quick-btn quick-btn-entrada" onclick="abrirMov('${p.id}','entrada')">↑ Entrada</button>
                    <button class="quick-btn quick-btn-saida" onclick="abrirMov('${p.id}','saida')" ${p.quantity===0?'disabled style="opacity:.4;cursor:not-allowed"':''}>↓ Saída</button>
                  </div>
                </td>
              </tr>`;
            }).join('')}
        </tbody>
      </table>
    </div>`;
}

// Modal de movimentação
function abrirMov(produtoId, tipo) {
  if (!Auth.can('products_write') && !Auth.can('all')) {
    Toast.error('Sem permissão', 'Você não pode registrar movimentações'); return;
  }
  Products.load();
  const p = Products.getById(produtoId);
  if (!p) return;
  document.getElementById('movProdutoId').value = produtoId;
  document.getElementById('movTipo').value = tipo;
  document.getElementById('movModalTitle').textContent = tipo === 'entrada' ? '↑ Registrar Entrada' : '↓ Registrar Saída';
  document.getElementById('movProdutoNome').textContent = p.name;
  document.getElementById('movEstoqueAtual').textContent = `Estoque atual: ${p.quantity} unidades`;
  document.getElementById('movQtd').value = '';
  document.getElementById('movMotivo').value = '';
  document.getElementById('movPreview').style.display = 'none';
  setTipo(tipo);
  Validators.clearErrors();
  Modal.open('movModal');
}
window.abrirMov = abrirMov;

function setTipo(tipo) {
  const eEl = document.getElementById('btnEntrada');
  const sEl = document.getElementById('btnSaida');
  document.getElementById('movTipo').value = tipo;
  if (tipo === 'entrada') {
    eEl.style.cssText = 'padding:var(--s3);border:2px solid var(--success);border-radius:var(--r-md);text-align:center;font-weight:700;font-size:13px;color:var(--success);background:var(--success-subtle)';
    sEl.style.cssText = 'padding:var(--s3);border:2px solid var(--border);border-radius:var(--r-md);text-align:center;font-weight:600;font-size:13px;color:var(--text-muted)';
  } else {
    sEl.style.cssText = 'padding:var(--s3);border:2px solid var(--danger);border-radius:var(--r-md);text-align:center;font-weight:700;font-size:13px;color:var(--danger);background:var(--danger-subtle)';
    eEl.style.cssText = 'padding:var(--s3);border:2px solid var(--border);border-radius:var(--r-md);text-align:center;font-weight:600;font-size:13px;color:var(--text-muted)';
  }
  updatePreview();
}
window.setTipo = setTipo;

function updatePreview() {
  const produtoId = document.getElementById('movProdutoId').value;
  const tipo = document.getElementById('movTipo').value;
  const qty = parseInt(document.getElementById('movQtd').value) || 0;
  if (!produtoId || !qty) { document.getElementById('movPreview').style.display='none'; return; }
  Products.load();
  const p = Products.getById(produtoId);
  if (!p) return;
  const nova = tipo === 'entrada' ? p.quantity + qty : p.quantity - qty;
  const preview = document.getElementById('movPreview');
  const previewVal = document.getElementById('movPreviewVal');
  preview.style.display = 'block';
  previewVal.textContent = nova < 0 ? 'Insuficiente!' : nova + ' unidades';
  previewVal.style.color = nova < 0 ? 'var(--danger)' : nova < 5 ? 'var(--warning)' : 'var(--success)';
}

function confirmarMovimento() {
  const produtoId = document.getElementById('movProdutoId').value;
  const tipo = document.getElementById('movTipo').value;
  const qty = document.getElementById('movQtd').value;
  const motivo = document.getElementById('movMotivo').value.trim();
  if (!qty || isNaN(qty) || Number(qty) <= 0) {
    Validators.showErrors({ movQtd: 'Informe uma quantidade válida' }); return;
  }
  const result = Estoque.registrar(produtoId, tipo, qty, motivo, session.name);
  if (result.success) {
    Modal.close('movModal');
    Products.load();
    Toast.success(tipo === 'entrada' ? 'Entrada registrada!' : 'Saída registrada!', `Novo estoque: ${result.novaQtd} unidades`);
    renderStats();
    if (currentTabEstoque === 'movimentos') renderMovimentos();
    else renderProdutosAcao();
  } else {
    Toast.error('Erro', result.message);
  }
}

function exportarMovimentos() {
  const movs = Estoque.getMovimentos();
  if (!movs.length) { Toast.warning('Sem dados', 'Nenhuma movimentação para exportar'); return; }
  const data = movs.map(m => ({
    Tipo: m.tipo, Produto: m.produtoNome, SKU: m.sku,
    Quantidade: m.quantidade, Estoque_Antes: m.qtdAntes, Estoque_Depois: m.qtdDepois,
    Motivo: m.motivo, Usuario: m.usuario,
    Data: new Date(m.data).toLocaleDateString('pt-BR'),
    Hora: new Date(m.data).toLocaleTimeString('pt-BR')
  }));
  Helpers.exportCSV(data, 'movimentacoes_estoque');
  Toast.success('CSV exportado!');
}
</script>
<div vw class="enabled"><div vw-access-button class="active"></div><div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div></div>
<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>new window.VLibras.Widget("https://vlibras.gov.br/app");</script>
</body>
</html>
