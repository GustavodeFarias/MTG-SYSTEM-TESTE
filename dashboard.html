<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTG SYSTEM — Dashboard</title>
  <link rel="stylesheet" href="app-bundle.css">
  <script src="app-bundle.js"></script>
</head>
<body>
<div class="app-shell" id="app"></div>
<div id="toastContainer" class="toast-container"></div>
<script>
const session = Auth.requireAuth();
if (session) {
  Products.load();
  const critical = Products.getCritical();
  const low = Products.getLow();
  const totalValue = Products.getTotalValue();
  const movs = Estoque.getMovimentos();
  const logs = Storage.get('logs') || [];
  const byCategory = Products.getByCategory();
  const cats = Object.entries(byCategory).sort((a,b)=>b[1]-a[1]);
  const total = cats.reduce((s,[,v])=>s+v,0);

  // Donut chart
  const COLORS = ['#3b82f6','#22d3ee','#10b981','#f59e0b','#ef4444','#8b5cf6','#f97316','#06b6d4'];
  let cumAngle=0;
  const segs = cats.slice(0,6).map(([,count],i)=>{
    const a=count/total*360, r=48, cx=60, cy=60;
    const s=(cumAngle-90)*Math.PI/180, e=(cumAngle+a-90)*Math.PI/180;
    const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);
    cumAngle+=a;
    return `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${a>180?1:0},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${COLORS[i]}"/>`;
  }).join('');

  // Bar chart data from real movements
  const now = new Date();
  const barMonths = Array.from({length:6},(_,i)=>{
    const d=new Date(now); d.setMonth(d.getMonth()-5+i);
    return { label:d.toLocaleDateString('pt-BR',{month:'short'}), month:d.getMonth(), year:d.getFullYear(), in:0, out:0 };
  });
  movs.forEach(m=>{
    const d=new Date(m.data);
    const bar=barMonths.find(b=>b.month===d.getMonth()&&b.year===d.getFullYear());
    if(bar){ if(m.tipo==='entrada') bar.in+=m.quantidade; else bar.out+=m.quantidade; }
  });
  // Add some base data so chart isn't empty
  barMonths.forEach(b=>{ if(!b.in&&!b.out){b.in=Math.floor(Math.random()*20+5);b.out=Math.floor(Math.random()*12+3);} });
  const maxBar=Math.max(...barMonths.map(b=>Math.max(b.in,b.out)),1);

  document.getElementById('app').innerHTML = renderLayout('Dashboard','dashboard.html') + `
  <main class="page-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Dashboard</h1>
        <p>Visão geral do estoque · ${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-secondary btn-sm" onclick="App.navigate('relatorios.html')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Relatórios
        </button>
        ${Auth.can('products_write')?`<button class="btn btn-primary btn-sm" onclick="App.navigate('produtos.html')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Novo Produto
        </button>`:''}
      </div>
    </div>

    ${critical.length>0?`<div class="alert alert-danger" style="margin-bottom:var(--s6)">
      <div class="alert-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
      <span class="alert-text"><strong>${critical.length} produto(s) com estoque crítico!</strong> Reposição urgente. <a href="produtos.html" style="color:inherit;text-decoration:underline;font-weight:600">Ver produtos →</a></span>
    </div>`:''}

    <div class="kpi-grid">
      <div class="kpi-card" style="--kpi-color:var(--brand-400);--kpi-bg:var(--brand-subtle)" onclick="App.navigate('produtos.html')">
        <div class="kpi-glow"></div>
        <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg></div>
        <div class="kpi-value">${Products.all.length}</div>
        <div class="kpi-label">Total de Produtos</div>
        <div class="kpi-change neutral">↗ ${Products.getCategories().length} categorias</div>
      </div>
      <div class="kpi-card" style="--kpi-color:var(--danger);--kpi-bg:var(--danger-subtle)" onclick="App.navigate('produtos.html')">
        <div class="kpi-glow" style="--kpi-bg:var(--danger-subtle)"></div>
        <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <div class="kpi-value" style="color:var(--danger)">${critical.length}</div>
        <div class="kpi-label">Estoque Crítico</div>
        ${critical.length>0?`<div class="kpi-change down">↓ Atenção urgente</div>`:`<div class="kpi-change up">✓ Tudo normal</div>`}
      </div>
      <div class="kpi-card" style="--kpi-color:var(--success);--kpi-bg:var(--success-subtle)">
        <div class="kpi-glow" style="--kpi-bg:var(--success-subtle)"></div>
        <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
        <div class="kpi-value" style="font-size:${totalValue>99999?'18px':totalValue>9999?'22px':'28px'}">${Formatters.currency(totalValue)}</div>
        <div class="kpi-label">Valor Total do Estoque</div>
        <div class="kpi-change up">↑ Inventário</div>
      </div>
      <div class="kpi-card" style="--kpi-color:var(--warning);--kpi-bg:var(--warning-subtle)" onclick="App.navigate('estoque.html')">
        <div class="kpi-glow" style="--kpi-bg:var(--warning-subtle)"></div>
        <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div>
        <div class="kpi-value">${movs.length}</div>
        <div class="kpi-label">Movimentações</div>
        <div class="kpi-change up">↑ ${Estoque.getTotalEntradas()} entradas</div>
      </div>
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Entrada vs Saída (6 meses)
        </div>
        <div class="bar-chart">
          ${barMonths.map(b=>`<div class="bar-wrap" style="justify-content:flex-end">
            <div style="display:flex;align-items:flex-end;gap:2px;flex:1;width:100%">
              <div class="bar bar-in" style="height:${Math.round(b.in/maxBar*100)}%"></div>
              <div class="bar bar-out" style="height:${Math.round(b.out/maxBar*100)}%"></div>
            </div>
            <div class="bar-label">${b.label}</div>
          </div>`).join('')}
        </div>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--brand-500)"></div>Entrada</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--bg-overlay);border:1px solid var(--border-light)"></div>Saída</div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Produtos por Categoria
        </div>
        ${cats.length===0?`<div style="text-align:center;color:var(--text-muted);padding:var(--s8)">Sem dados</div>`:`
        <div class="donut-wrap">
          <svg width="120" height="120" viewBox="0 0 120 120">${segs}<circle cx="60" cy="60" r="28" fill="var(--bg-surface)"/></svg>
          <div class="donut-legend">
            ${cats.slice(0,6).map(([cat,count],i)=>`<div class="donut-item">
              <div class="donut-color" style="background:${COLORS[i]}"></div>
              <div class="donut-name">${cat}</div>
              <div class="donut-pct">${Math.round(count/total*100)}%</div>
            </div>`).join('')}
          </div>
        </div>`}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--s4)">
      <div class="card">
        <div class="card-header">
          <div><div class="card-title">Estoque Crítico</div><div class="card-subtitle">Produtos abaixo de 5 unidades</div></div>
          <a href="produtos.html" style="color:var(--brand-400);font-size:13px;font-weight:600">Ver todos →</a>
        </div>
        ${critical.length===0
          ?`<div style="text-align:center;color:var(--text-muted);padding:var(--s8) 0;font-size:14px">✓ Nenhum produto crítico</div>`
          :critical.slice(0,6).map(p=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
              <div>
                <div style="font-size:13.5px;font-weight:600;color:var(--text-primary)">${p.name}</div>
                <div style="font-size:11px;color:var(--text-muted)">${p.sku} · ${p.category}</div>
              </div>
              <span class="badge badge-danger badge-dot">${p.quantity} un</span>
            </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-header">
          <div><div class="card-title">Atividade Recente</div><div class="card-subtitle">Últimas ações no sistema</div></div>
        </div>
        ${logs.length===0
          ?`<div style="color:var(--text-muted);font-size:13px;padding:var(--s4) 0">Nenhuma atividade registrada</div>`
          :logs.slice(0,6).map(log=>`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
              <div style="width:7px;height:7px;border-radius:50%;background:var(--brand-500);flex-shrink:0;margin-top:5px"></div>
              <div style="flex:1;min-width:0">
                <div style="font-size:12.5px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${log.message}</div>
                <div style="font-size:11px;color:var(--text-faint)">${log.user} · ${Formatters.timeAgo(log.timestamp)}</div>
              </div>
            </div>`).join('')}
      </div>
    </div>
  </main>
</div>`;
  App.init();
}
</script>
<div vw class="enabled"><div vw-access-button class="active"></div><div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div></div>
<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>new window.VLibras.Widget("https://vlibras.gov.br/app");</script>
</body>
</html>
