<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTG SYSTEM — Usuários</title>
  <link rel="stylesheet" href="app-bundle.css">
  <script src="app-bundle.js"></script>
  
  
</head>
<body>
<div class="app-shell" id="app"></div>
<div id="toastContainer" class="toast-container"></div>

<!-- User Modal -->
<div id="userModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="userModalTitle">Novo Usuário</div>
      <button class="modal-close" onclick="Modal.close('userModal')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="userForm">
        <input type="hidden" id="userId">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Nome Completo *</label>
            <input type="text" id="uName" class="form-input" placeholder="Nome completo">
            <div class="form-error" data-error="uName"></div>
          </div>
          <div class="form-group">
            <label class="form-label">E-mail *</label>
            <input type="email" id="uEmail" class="form-input" placeholder="email@exemplo.com">
            <div class="form-error" data-error="uEmail"></div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Perfil de Acesso</label>
            <select id="uRole" class="form-input form-select">
              <option value="visualizador">Visualizador</option>
              <option value="estoquista">Estoquista</option>
              <option value="analista">Analista</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select id="uStatus" class="form-input form-select">
              <option value="active">Ativo</option>
              <option value="inactive">Inativo</option>
              <option value="blocked">Bloqueado</option>
            </select>
          </div>
        </div>
        <div id="passwordSection">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Senha</label>
              <input type="password" id="uPassword" class="form-input" placeholder="••••••••">
              <div class="form-hint" id="pwdHint"></div>
              <div class="form-error" data-error="uPassword"></div>
            </div>
            <div class="form-group">
              <label class="form-label">Confirmar Senha</label>
              <input type="password" id="uConfirm" class="form-input" placeholder="••••••••">
              <div class="form-error" data-error="uConfirm"></div>
            </div>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('userModal')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveUser()">
        <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Salvar
      </button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div id="confirmModal" class="modal-overlay">
  <div class="modal modal-sm">
    <div class="modal-body">
      <div class="confirm-dialog">
        <div class="confirm-icon danger">
          <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div class="confirm-title">Confirmar ação</div>
        <div class="confirm-message"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('confirmModal')">Cancelar</button>
      <button class="btn btn-danger" id="confirmBtn">Confirmar</button>
    </div>
  </div>
</div>

<script>
const session = Auth.requireAuth();
if (session) {
  if (session.role !== 'admin') {
    Toast.error('Acesso negado', 'Apenas administradores podem acessar esta página.');
    setTimeout(() => window.location.href = 'dashboard.html', 1500);
  }

  Users.load();

  document.getElementById('app').innerHTML = renderLayout('Usuários', 'usuarios.html') + `
  <main class="page-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Usuários</h1>
        <p>Gerenciamento de contas e permissões</p>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-primary" onclick="openCreate()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Novo Usuário
        </button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="userTabs">
      <div class="tab active" onclick="setTab('all',this)">Todos</div>
      <div class="tab" onclick="setTab('active',this)">Ativos</div>
      <div class="tab" onclick="setTab('inactive',this)">Inativos</div>
      <div class="tab" onclick="setTab('blocked',this)">Bloqueados</div>
    </div>

    <div class="table-container">
      <div class="table-toolbar">
        <div class="table-search-wrap">
          <div class="input-icon"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
          <input type="text" class="form-input" id="userSearch" placeholder="Buscar por nome ou e-mail..." style="padding-left:38px">
        </div>
        <div class="table-filters">
          <select class="form-input form-select" id="roleFilter" style="max-width:180px">
            <option value="">Todos os perfis</option>
            <option value="admin">Administrador</option>
            <option value="estoquista">Estoquista</option>
            <option value="analista">Analista</option>
            <option value="visualizador">Visualizador</option>
          </select>
        </div>
      </div>
      <div id="usersTable"></div>
    </div>

    <!-- Log section -->
    <div style="margin-top:var(--s6)">
      <div class="section-header">
        <div class="section-title">Histórico de Ações</div>
        <button class="btn btn-secondary btn-sm" onclick="clearLogs()">Limpar histórico</button>
      </div>
      <div class="table-container">
        <div id="logsTable"></div>
      </div>
    </div>
  </main>
</div>`;

  App.init();
  renderUsers();
  renderLogs();

  let currentTab = 'all';
  document.getElementById('userSearch').addEventListener('input', Helpers.debounce(renderUsers, 250));
  document.getElementById('roleFilter').addEventListener('change', renderUsers);

  function setTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('#userTabs .tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderUsers();
  }
  window.setTab = setTab;
}

function renderUsers() {
  let users = Users.getAll();
  const tab = window.currentTab || 'all';
  const search = document.getElementById('userSearch')?.value.toLowerCase() || '';
  const roleFilter = document.getElementById('roleFilter')?.value || '';

  if (tab !== 'all') users = users.filter(u => u.status === tab);
  if (search) users = users.filter(u => u.name.toLowerCase().includes(search) || u.email.toLowerCase().includes(search));
  if (roleFilter) users = users.filter(u => u.role === roleFilter);

  const currentSession = Auth.getSession();
  const roleColors = { admin: 'badge-danger', estoquista: 'badge-warning', analista: 'badge-info', visualizador: 'badge-neutral' };
  const statusBadge = s => s === 'active' ? '<span class="badge badge-success badge-dot">Ativo</span>' :
    s === 'blocked' ? '<span class="badge badge-danger badge-dot">Bloqueado</span>' :
    '<span class="badge badge-neutral badge-dot">Inativo</span>';

  const html = `<table>
    <thead><tr>
      <th>Usuário</th>
      <th>E-mail</th>
      <th>Perfil</th>
      <th>Status</th>
      <th>Criado em</th>
      <th>Ações</th>
    </tr></thead>
    <tbody>
    ${users.length === 0 ? `<tr><td colspan="6"><div class="table-empty">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <p>Nenhum usuário encontrado</p></div></td></tr>` :
    users.map(u => {
      const isSelf = u.id === currentSession?.id;
      return `<tr>
        <td>
          <div style="display:flex;align-items:center;gap:var(--s3)">
            <div style="width:34px;height:34px;border-radius:50%;background:${isSelf?'var(--brand-500)':'var(--border-light)'};display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-weight:700;color:${isSelf?'white':'var(--text-secondary)'};flex-shrink:0">${u.name.charAt(0)}</div>
            <div>
              <div style="font-weight:600;color:var(--text-primary)">${u.name}${isSelf?' <span style="font-size:10px;color:var(--brand-400)">(você)</span>':''}</div>
            </div>
          </div>
        </td>
        <td style="color:var(--text-muted)">${u.email}</td>
        <td><span class="badge ${roleColors[u.role]||'badge-neutral'}">${Formatters.rolePT(u.role)}</span></td>
        <td>${statusBadge(u.status)}</td>
        <td style="color:var(--text-muted)">${Formatters.date(u.createdAt)}</td>
        <td>
          <div class="table-actions">
            <button class="btn btn-ghost btn-icon btn-sm" onclick="openEdit('${u.id}')" title="Editar">
              <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            ${!isSelf ? `
            <button class="btn btn-ghost btn-icon btn-sm" onclick="toggleStatus('${u.id}','${u.status}')" title="${u.status==='active'?'Desativar':'Ativar'}">
              <svg viewBox="0 0 24 24" width="14" height="14" stroke="${u.status==='active'?'var(--warning)':'var(--success)'}" fill="none" stroke-width="2">
                ${u.status==='active'?'<circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/>':'<circle cx="12" cy="12" r="10"/><polyline points="12 8 12 12 14 14"/>'}
              </svg>
            </button>
            ${u.status!=='blocked'?`<button class="btn btn-ghost btn-icon btn-sm" onclick="blockUser('${u.id}')" title="Bloquear">
              <svg viewBox="0 0 24 24" width="14" height="14" stroke="var(--brand-400)" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
            </button>`:''}
            <button class="btn btn-ghost btn-icon btn-sm" onclick="deleteUser('${u.id}','${u.name.replace(/'/g,"\\'")}')">
              <svg viewBox="0 0 24 24" width="14" height="14" stroke="var(--brand-400)" fill="none" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
            </button>` : ''}
          </div>
        </td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>`;
  document.getElementById('usersTable').innerHTML = html;
}

function renderLogs() {
  const logs = Storage.get('logs') || [];
  const iconMap = {
    login: '→', logout: '←', product_create: '+', product_update: '✎',
    product_delete: '✕', user_create: '+', user_update: '✎',
    user_delete: '✕', user_status: '●'
  };
  const html = `<table>
    <thead><tr><th>Tipo</th><th>Descrição</th><th>Usuário</th><th>Perfil</th><th>Data/Hora</th></tr></thead>
    <tbody>
    ${logs.length === 0 ? '<tr><td colspan="5" style="text-align:center;padding:var(--s8);color:var(--text-faint)">Nenhuma ação registrada</td></tr>' :
    logs.slice(0, 50).map(log => `<tr>
      <td><span style="font-family:monospace;font-size:14px;color:var(--brand-400)">${iconMap[log.type]||'·'}</span></td>
      <td style="font-size:13px">${log.message}</td>
      <td style="font-size:13px;color:var(--text-muted)">${log.user}</td>
      <td><span class="badge badge-neutral">${Formatters.rolePT(log.role)}</span></td>
      <td style="font-size:12px;color:var(--text-muted)">${Formatters.datetime(log.timestamp)}</td>
    </tr>`).join('')}
    </tbody>
  </table>`;
  document.getElementById('logsTable').innerHTML = html;
}

function clearLogs() {
  Modal.confirm({ title: 'Limpar histórico?', message: 'Todas as entradas do log serão removidas permanentemente.', onConfirm: () => {
    Storage.set('logs', []);
    renderLogs();
    Toast.success('Histórico limpo', 'Todas as entradas foram removidas.');
  }});
}

function openCreate() {
  document.getElementById('userId').value = '';
  document.getElementById('userModalTitle').textContent = 'Novo Usuário';
  document.getElementById('uName').value = '';
  document.getElementById('uEmail').value = '';
  document.getElementById('uRole').value = 'visualizador';
  document.getElementById('uStatus').value = 'active';
  document.getElementById('uPassword').value = '';
  document.getElementById('uConfirm').value = '';
  document.getElementById('uEmail').disabled = false;
  document.getElementById('pwdHint').textContent = 'Mínimo 6 caracteres';
  Validators.clearErrors();
  Modal.open('userModal');
}

function openEdit(id) {
  const u = Users.getById(id);
  if (!u) return;
  document.getElementById('userId').value = u.id;
  document.getElementById('userModalTitle').textContent = 'Editar Usuário';
  document.getElementById('uName').value = u.name;
  document.getElementById('uEmail').value = u.email;
  document.getElementById('uEmail').disabled = true;
  document.getElementById('uRole').value = u.role;
  document.getElementById('uStatus').value = u.status;
  document.getElementById('uPassword').value = '';
  document.getElementById('uConfirm').value = '';
  document.getElementById('pwdHint').textContent = 'Deixe em branco para manter a senha atual';
  Validators.clearErrors();
  Modal.open('userModal');
}

function saveUser() {
  Validators.clearErrors();
  const id = document.getElementById('userId').value;
  const name = document.getElementById('uName').value.trim();
  const email = document.getElementById('uEmail').value.trim();
  const role = document.getElementById('uRole').value;
  const status = document.getElementById('uStatus').value;
  const password = document.getElementById('uPassword').value;
  const confirm = document.getElementById('uConfirm').value;
  const errs = {};
  if (!name) errs.uName = 'Campo obrigatório';
  if (!id && (!email || !Validators.email(email))) errs.uEmail = 'E-mail inválido';
  if (!id && !password) errs.uPassword = 'Senha obrigatória para novo usuário';
  if (password && password.length < 6) errs.uPassword = 'Mínimo 6 caracteres';
  if (password && password !== confirm) errs.uConfirm = 'As senhas não coincidem';
  if (Object.keys(errs).length) { Validators.showErrors(errs); return; }
  if (id) {
    const data = { name, role, status };
    if (password) data.password = password;
    Users.update(id, data);
    Toast.success('Usuário atualizado!', name);
  } else {
    const result = Users.create({ name, email, role, password });
    if (!result.success) { Toast.error('Erro', result.message); return; }
    Toast.success('Usuário criado!', name);
  }
  Modal.close('userModal');
  Users.load();
  renderUsers();
}

function toggleStatus(id, current) {
  const newStatus = current === 'active' ? 'inactive' : 'active';
  Users.setStatus(id, newStatus);
  Toast.info('Status alterado', newStatus === 'active' ? 'Usuário ativado' : 'Usuário desativado');
  Users.load();
  renderUsers();
  renderLogs();
}

function blockUser(id) {
  const u = Users.getById(id);
  Modal.confirm({ title: 'Bloquear usuário?', message: `"${u?.name}" não poderá mais acessar o sistema.`, onConfirm: () => {
    Users.setStatus(id, 'blocked');
    Toast.warning('Usuário bloqueado', u?.name);
    Users.load(); renderUsers(); renderLogs();
  }});
}

function deleteUser(id, name) {
  Modal.confirm({ title: 'Excluir usuário?', message: `"${name}" será removido permanentemente.`, onConfirm: () => {
    if (!Users.delete(id)) { Toast.error('Erro', 'Não é possível excluir seu próprio usuário.'); return; }
    Toast.success('Usuário removido', name);
    Users.load(); renderUsers(); renderLogs();
  }});
}
</script>

<!-- VLibras - Acessibilidade em LIBRAS -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>
<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>new window.VLibras.Widget("https://vlibras.gov.br/app");</script>

</body>
</html>
